name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write   # 允许创建 GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get version from tag
        id: version
        run: echo "name=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk "dist/LocalWriter-v${{ steps.version.outputs.name }}.apk"

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LocalWriter v${{ steps.version.outputs.name }}"
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*.apk
          make_latest: true
