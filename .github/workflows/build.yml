name: Build Debug APK

on:
  push:
    branches: [ "main", "copilot/**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        run: find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Get version name
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo 'v0.0.0')
          VERSION=${TAG#v}
          echo "name=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/*.apk dist/LocalWriter-v${{ steps.version.outputs.name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalWriter-${{ github.sha }}
          path: dist/*.apk
          retention-days: 14


