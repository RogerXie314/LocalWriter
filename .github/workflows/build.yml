name: Build Debug APK

on:
  push:
    branches: [ "main", "copilot/**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        run: find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | grep -v '//' | head -1 | sed 's/.*versionName "\(.*\)".*/\1/')
          echo "name=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/*.apk dist/LocalWriter-v${{ steps.version.outputs.name }}-debug.apk

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalWriter-debug-${{ github.sha }}
          path: dist/*.apk
          retention-days: 14

      - name: Create GitHub Release (main branch only)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: LocalWriter ${{ steps.version.outputs.name }}
          body: |
            🤖 自动构建 Debug APK
            
            **Commit**: ${{ github.sha }}
            **Branch**: ${{ github.ref_name }}
            **Build time**: ${{ github.event.head_commit.timestamp }}
            
            > 安装前需在手机「设置 → 安全」中开启「允许安装未知来源应用」。
          files: dist/*.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
